name: anti_proxy_attendance
description: A secure smart attendance system for Indian colleges.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.0
  geolocator: ^11.0.0
  google_ml_kit: ^0.18.0
  image_picker: ^1.1.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  http: ^1.6.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
